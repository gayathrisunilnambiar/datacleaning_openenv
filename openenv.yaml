name: data-cleaning-env
version: "1.0.0"
description: >
  A deterministic, multi-task OpenEnv benchmark for iterative tabular data
  cleaning. Agents improve dirty DataFrames step by step and are graded on
  process quality as well as final table similarity.
tags:
  - openenv
  - data-cleaning
  - tabular
  - real-world
  - llm-evaluation

action_space:
  drop_duplicates:
    type: object
    description: Remove duplicate rows from the current DataFrame.
    required_params: []
    optional_params: []
    column_required: false

  fill_nulls:
    type: object
    description: Fill null values in a specific column.
    required_params:
      - name: strategy
        type: string
        enum: [mean, median, mode, constant]
        description: Imputation strategy.
    optional_params:
      - name: value
        type: any
        description: Required when strategy is constant.
    column_required: true

  cast_column:
    type: object
    description: Cast a column to a target dtype.
    required_params:
      - name: dtype
        type: string
        enum: [int, float, str, bool, datetime]
        description: Target dtype.
    optional_params: []
    column_required: true

  remove_outliers:
    type: object
    description: Clip outliers in a numeric column.
    required_params:
      - name: method
        type: string
        enum: [iqr, zscore]
        description: Outlier detection method.
    optional_params:
      - name: threshold
        type: float
        description: Optional sensitivity override.
    column_required: true

  rename_column:
    type: object
    description: Rename an existing column.
    required_params:
      - name: new_name
        type: string
        description: Replacement column name.
    optional_params: []
    column_required: true

  normalize_values:
    type: object
    description: Map inconsistent categorical values to canonical labels.
    required_params:
      - name: mapping
        type: "dict[str, any]"
        description: Dirty-to-clean value mapping.
    optional_params: []
    column_required: true

  submit:
    type: object
    description: End the episode and trigger final grading.
    required_params: []
    optional_params: []
    column_required: false

observation_space:
  task_id:
    type: string
    description: Active task identifier.
  step_number:
    type: integer
    description: Number of steps taken in the current episode.
  current_df:
    type: "list[dict[str, any]]"
    description: Current DataFrame serialized as JSON records.
  dirty_columns:
    type: "list[str]"
    description: Columns that still differ from the hidden ground truth.
  columns_meta:
    type: "dict[str, str]"
    description: Current pandas dtype string for each column.
  episode_reward_so_far:
    type: float
    description: Cumulative reward earned so far.
  done:
    type: boolean
    description: Whether the episode has ended.
  max_steps:
    type: integer
    description: Maximum step budget for the active task.
  task_description:
    type: string
    description: Human-readable task description.

tasks:
  - id: easy
    difficulty: easy
    domain: Employee Records
    rows: 50
    columns: 6
    max_steps: 20
    description: >
      Employee records with duplicate rows and missing values in the age and
      salary columns.
    issues:
      - duplicate_rows
      - missing_age
      - missing_salary

  - id: medium
    difficulty: medium
    domain: Sales Transactions
    rows: 120
    columns: 8
    max_steps: 30
    description: >
      Sales transactions with mixed numeric string formats, inconsistent date
      formats, arithmetic errors in total, and outliers in unit_price.
    issues:
      - quantity_as_messy_string
      - unit_price_as_messy_string
      - mixed_date_formats
      - arithmetic_errors_in_total
      - outliers_in_unit_price

  - id: hard
    difficulty: hard
    domain: Hospital Admissions
    rows: 200
    columns: 10
    max_steps: 40
    description: >
      Hospital admissions with duplicates, missing values, mixed date formats,
      inconsistent gender labels, mixed weight units, blood-type typos, and
      heterogeneous boolean encoding.
    issues:
      - duplicate_rows
      - missing_age
      - missing_weight_kg
      - mixed_date_formats
      - inconsistent_gender
      - mixed_weight_units_kg_lbs
      - blood_type_typos
      - mixed_boolean_readmitted

  - id: random
    difficulty: variable
    domain: Procedural
    rows: 60-150
    columns: variable
    max_steps: 25
    description: >
      Procedurally generated task with a random domain and 2-4 injected data
      quality issues. Reproducible when a seed is provided.
    issues:
      - duplicate_rows
      - missing_numeric
      - missing_categorical
      - type_as_string
      - mixed_dates
      - outliers
      - inconsistent_categorical

reward_range: [0.0, 1.0]

reward_shaping:
  column_improvement: >
    Sum of per-column similarity deltas for columns that moved closer to the
    ground truth on this step.
  submit_bonus: >
    +0.30 when submit is called and overall similarity is greater than 0.80.
  no_op_penalty: >
    -0.05 when an action causes zero observable DataFrame change.

endpoints:
  root: GET /
  health: GET /health
  metadata: GET /metadata
  schema: GET /schema
  tasks: GET /tasks
  state: GET /state
  reset: POST /reset
  step: POST /step
  submit: POST /submit
  mcp: POST /mcp
  validate: POST /validate
  admin_sessions: GET /admin/sessions

baseline_scores:
  dry_run:
    easy: 1.0000
    medium: 0.9811
    hard: 0.8332
  dirty_data_calibration:
    easy: 0.3921
    medium: 0.2930
    hard: 0.2493

test_results:
  total_tests: 26
  passing: 26
  failing: 0
  last_verified: "2026-04-08"

authentication:
  type: optional_api_key
  header: X-API-Key
  enforcement: only when API_KEY env var is set
  competition_note: >
    HF Space runs with API_KEY unset.
    All OpenEnv endpoints freely accessible to validator.
  protected_routes:
    - GET /admin/sessions
    - POST /submit

compliance:
  hf_space_url: https://sanvihs2005-data-cleaning-env.hf.space
  docker_verified: true
  inference_runtime_seconds: 18
  openenv_spec_version: "1.0"

docker:
  build: docker build -t data-cleaning-env .
  run: docker run -p 7860:7860 data-cleaning-env

hf_space: https://sanvihs2005-data-cleaning-env.hf.space
